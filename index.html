<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ChefSync"/>
<title>ChefSync IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{
  --bg:#0d0c0a;--s1:#171612;--s2:#1f1d19;--s3:#272420;--s4:#302e2a;
  --gold:#c8a84b;--goldl:#e0c478;--goldd:#9a7828;
  --cream:#f2ece0;--muted:#7a7060;--border:rgba(200,168,75,0.14);
  --green:#4caf82;--red:#e05c5c;--orange:#e09a3c;
  --r:15px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--cream);}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);position:relative;}

/* TOPBAR */
.topbar{
  padding:calc(var(--safe-top) + 10px) 18px 12px;
  background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--goldl);}
.logo small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:-2px;}
.topbar-right{display:flex;gap:8px;}
.ic{width:36px;height:36px;background:var(--s3);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;position:relative;}
.dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--gold);border-radius:50%;}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + var(--safe-bot));}
#content::-webkit-scrollbar{display:none;}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + var(--safe-bot));z-index:100;
}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;transition:color .2s;}
.ni.on{color:var(--goldl);}
.ni .ico{font-size:21px;line-height:1;}
.ni.on .ico{filter:drop-shadow(0 0 5px rgba(200,168,75,.5));}

/* BUTTONS */
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldl));color:#1a1610;border:none;padding:14px;border-radius:12px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity .15s;}
.btn-gold:active{opacity:.82;}
.btn-out{background:var(--s3);color:var(--cream);border:1px solid var(--border);padding:13px;border-radius:12px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;}
.btn-sm{padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;}
.btn-sm.g{background:linear-gradient(135deg,var(--gold),var(--goldl));color:#1a1610;}
.btn-sm.o{background:var(--s3);color:var(--cream);border:1px solid var(--border);}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.card-p{padding:16px;}
.row{display:flex;align-items:center;gap:10px;}

/* FORMS */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--cream);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;
  -webkit-appearance:none;
}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field select option{background:var(--s2);}
.field textarea{resize:none;min-height:70px;}

/* SECTION HEADER */
.sh{padding:18px 18px 10px;display:flex;align-items:baseline;justify-content:space-between;}
.sh h2{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;}
.sh a{font-size:12px;color:var(--gold);cursor:pointer;}

/* ALERT */
.alert{margin:0 18px 14px;background:rgba(224,154,60,.1);border:1px solid rgba(224,154,60,.25);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:11px;font-size:13px;line-height:1.4;}

/* KPI GRID */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px 18px;}
.kcard{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:15px;}
.kcard .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.kcard .val{font-size:24px;font-weight:700;margin-bottom:2px;}
.kcard .sub{font-size:11px;color:var(--muted);}
.kcard .sub.up{color:var(--green);}

/* QUICK ACTIONS */
.qa-scroll{display:flex;gap:10px;padding:0 18px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.qa-scroll::-webkit-scrollbar{display:none;}
.qa{flex-shrink:0;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;min-width:120px;cursor:pointer;transition:border-color .2s;}
.qa:active{border-color:rgba(200,168,75,.4);}
.qa .qi{font-size:22px;margin-bottom:7px;}
.qa .ql{font-size:13px;font-weight:500;line-height:1.3;}

/* LIST ITEMS */
.li{margin:0 18px 10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;cursor:pointer;}
.li:active{background:var(--s2);}
.li .ln{font-size:14px;font-weight:500;margin-bottom:3px;}
.li .lm{font-size:12px;color:var(--muted);}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.g{background:rgba(76,175,130,.15);color:var(--green);}
.pill.o{background:rgba(224,154,60,.15);color:var(--orange);}
.pill.r{background:rgba(224,92,92,.15);color:var(--red);}
.pill.b{background:rgba(200,168,75,.12);color:var(--goldl);}

/* MARGE BAR */
.mbar{background:var(--s3);border-radius:100px;height:4px;overflow:hidden;margin-top:10px;}
.mbar-f{height:100%;border-radius:100px;}
.mbar-f.g{background:linear-gradient(90deg,var(--green),#7de0b0);}
.mbar-f.o{background:linear-gradient(90deg,var(--orange),#f0c060);}
.mbar-f.r{background:linear-gradient(90deg,var(--red),#f08080);}

/* CHIPS */
.chips{display:flex;gap:8px;padding:0 18px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--s1);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s;}
.chip.on{background:rgba(200,168,75,.12);color:var(--goldl);border-color:rgba(200,168,75,.4);}

/* SEARCH */
.sbar{margin:14px 18px 10px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px 15px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.sbar input{flex:1;background:none;border:none;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.sbar input::placeholder{color:var(--muted);}

/* MERCU ITEM */
.mi{margin:0 18px 10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.mi-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mi-name{font-size:14px;font-weight:500;flex:1;}
.mi-price{font-size:16px;font-weight:700;color:var(--goldl);}
.mi-bot{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.tag{font-size:11px;padding:3px 8px;background:var(--s3);border-radius:20px;color:var(--muted);}

/* CHAT */
.chat-area{display:flex;flex-direction:column;height:calc(100dvh - 130px);}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
.msgs::-webkit-scrollbar{display:none;}
.msg{display:flex;gap:7px;align-items:flex-end;}
.msg.u{flex-direction:row-reverse;}
.av{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.av.ai{background:linear-gradient(135deg,var(--gold),var(--goldl));color:#1a1610;}
.av.u{background:var(--s3);border:1px solid var(--border);}
.bub{max-width:78%;padding:11px 13px;border-radius:15px;font-size:13px;line-height:1.6;}
.bub.ai{background:var(--s1);border:1px solid var(--border);border-bottom-left-radius:3px;}
.bub.u{background:linear-gradient(135deg,var(--goldd),var(--gold));color:#1a1610;font-weight:500;border-bottom-right-radius:3px;}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0;}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.sugs{display:flex;gap:7px;padding:6px 18px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sugs::-webkit-scrollbar{display:none;}
.sug{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(200,168,75,.3);background:rgba(200,168,75,.07);color:var(--goldl);font-family:'DM Sans',sans-serif;white-space:nowrap;}
.cinput{padding:9px 15px calc(9px + var(--safe-bot));background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.cinput input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:24px;padding:11px 15px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.cinput input::placeholder{color:var(--muted);}
.send{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--goldl));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;}

/* MODAL SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;flex-direction:column;justify-content:flex-end;z-index:500;}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;border-top:1px solid var(--border);max-height:88dvh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bot));}
.sheet::-webkit-scrollbar{display:none;}
.handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto;}
.sheet-head{padding:12px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
.sheet-head .title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;flex:1;}
.cls{width:30px;height:30px;background:var(--s3);border:none;border-radius:8px;cursor:pointer;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:18px;}

/* COST GRID */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-top:14px;}
.citem .cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
.citem .cv{font-size:20px;font-weight:700;}
.cv.gold{color:var(--goldl);}
.cv.grn{color:var(--green);}

/* SETTINGS */
.set-section{margin:0 18px 18px;}
.set-section h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.set-row{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.set-item{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;}
.set-item:last-child{border-bottom:none;}
.set-item:active{background:var(--s2);}
.set-icon{width:34px;height:34px;background:var(--s3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.set-label{flex:1;font-size:14px;font-weight:500;}
.set-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.set-arr{color:var(--muted);font-size:14px;}

/* TOAST */
#toast{position:fixed;top:calc(var(--safe-top) + 80px);left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* EMPTY STATE */
.empty{text-align:center;padding:50px 30px;color:var(--muted);}
.empty .ei{font-size:40px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.6;}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(80px + var(--safe-bot));width:52px;height:52px;background:linear-gradient(135deg,var(--gold),var(--goldl));border:none;border-radius:50%;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(200,168,75,.35);z-index:90;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">ChefSync IA<small>Assistant cuisine pro</small></div>
    <div class="topbar-right">
      <div class="ic" onclick="showSettings()">⚙️</div>
      <div class="ic" onclick="setTab('ai')">🤖<div class="dot" id="ai-dot" style="display:none"></div></div>
    </div>
  </div>
  <div id="content"></div>
  <nav class="bnav">
    <div class="ni on" id="ni-home" onclick="setTab('home')"><div class="ico">🏠</div>Accueil</div>
    <div class="ni" id="ni-scan" onclick="setTab('scan')"><div class="ico">📷</div>Scanner</div>
    <div class="ni" id="ni-mercu" onclick="setTab('mercu')"><div class="ico">📦</div>Mercuriale</div>
    <div class="ni" id="ni-rec" onclick="setTab('rec')"><div class="ico">🍽️</div>Recettes</div>
    <div class="ni" id="ni-ai" onclick="setTab('ai')"><div class="ico">🤖</div>Assistant</div>
  </nav>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
const DB = {
  get(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

let products = DB.get('csync_products',[]);
let recettes = DB.get('csync_recettes',[]);
let chatHistory = DB.get('csync_chat',[{role:'ai',text:'Bonjour 👨‍🍳 Je suis votre assistant ChefSync. Je connais votre mercuriale et vos recettes. Comment puis-je vous aider ?'}]);
let apiKey = DB.get('csync_apikey','');
let restName = DB.get('csync_restname','Mon Restaurant');
let currentTab = 'home';
let scanStep = 0;
let scanProgress = 0;
let filterCat = 'Tous';
let searchQ = '';
let isTyping = false;
let modalStack = [];

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function save(){
  DB.set('csync_products',products);
  DB.set('csync_recettes',recettes);
  DB.set('csync_chat',chatHistory.slice(-40));
}

function toast(msg,color='var(--green)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function $(id){return document.getElementById(id);}
function el(tag,cls,html=''){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}

function margeCls(m){return m>=70?'g':m>=55?'o':'r';}
function margeColor(m){return m>=70?'var(--green)':m>=55?'var(--orange)':'var(--red)';}

const CAT_COLORS={'Poisson':'#4c9ff0','Crèmerie':'#f0d04c','Légumes':'#a0d04c','Viande':'#e07060','Épicerie':'#e07040','Boissons':'#9060e0','Autre':'#7a7060'};
const CATS=['Poisson','Crèmerie','Légumes','Viande','Épicerie','Boissons','Autre'];

function getCategories(){
  const cats=['Tous',...new Set(products.map(p=>p.cat).filter(Boolean))];
  return cats;
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function setTab(t){
  currentTab=t;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const ni=$('ni-'+t);if(ni)ni.classList.add('on');
  render();
  $('content').scrollTop=0;
}

// ═══════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════
function render(){
  const c=$('content');
  if(currentTab==='home') c.innerHTML=renderHome();
  else if(currentTab==='scan') c.innerHTML=renderScan();
  else if(currentTab==='mercu') c.innerHTML=renderMercu();
  else if(currentTab==='rec') c.innerHTML=renderRec();
  else if(currentTab==='ai') { c.innerHTML=renderAI(); scrollMsgs(); }
  bindEvents();
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderHome(){
  const avgMarge = recettes.length ? (recettes.reduce((a,r)=>a+(r.marge||0),0)/recettes.length).toFixed(1) : '—';
  const alerts = products.filter(p=>p.trend==='up');
  return `
  <div style="padding:18px 18px 10px">
    <div style="font-size:13px;color:var(--muted)">Bonjour,</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600">Bonne mise en place 🍴</div>
  </div>
  ${alerts.length?`<div class="alert"><span>⚠️</span><span>Hausse de prix détectée sur <strong>${alerts.length} produit(s)</strong> — vérifiez vos marges.</span></div>`:''}
  <div class="kgrid">
    <div class="kcard"><div class="lbl">Produits</div><div class="val">${products.length}</div><div class="sub">référencés</div></div>
    <div class="kcard"><div class="lbl">Marge moy.</div><div class="val">${avgMarge}${avgMarge!=='—'?'%':''}</div><div class="sub up">fiches recettes</div></div>
    <div class="kcard"><div class="lbl">Recettes</div><div class="val">${recettes.length}</div><div class="sub">créées</div></div>
    <div class="kcard"><div class="lbl">Fournisseurs</div><div class="val">${new Set(products.map(p=>p.fournisseur).filter(Boolean)).size||0}</div><div class="sub">actifs</div></div>
  </div>
  <div class="sh"><h2>Actions rapides</h2></div>
  <div class="qa-scroll">
    <div class="qa" onclick="setTab('scan')"><div class="qi">📷</div><div class="ql">Scanner facture</div></div>
    <div class="qa" onclick="showAddProduct()"><div class="qi">📦</div><div class="ql">Ajouter produit</div></div>
    <div class="qa" onclick="showAddRecette()"><div class="qi">🍽️</div><div class="ql">Créer recette</div></div>
    <div class="qa" onclick="setTab('ai')"><div class="qi">🤖</div><div class="ql">Demander à l'IA</div></div>
  </div>
  ${recettes.length?`
  <div class="sh"><h2>Mes recettes</h2><a onclick="setTab('rec')">Tout voir</a></div>
  ${recettes.slice(0,3).map(r=>`
  <div class="li row" onclick="showRecetteDetail(${recettes.indexOf(r)})">
    <div style="width:40px;height:40px;background:var(--s3);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0">${r.emoji||'🍽️'}</div>
    <div style="flex:1"><div class="ln">${r.nom}</div><div class="lm">Coût : ${r.cout||'—'}€ · Vente : ${r.vente||'—'}€</div></div>
    <div class="pill ${margeCls(r.marge||0)}">${r.marge?r.marge.toFixed(0)+'%':'—'}</div>
  </div>`).join('')}`:''}
  <div style="height:10px"></div>`;
}

// ═══════════════════════════════════════════
// SCAN
// ═══════════════════════════════════════════
function renderScan(){
  if(scanStep===0) return renderScan0();
  if(scanStep===1) return renderScan1();
  return renderScan0();
}
function renderScan0(){
  return `
  <div style="height:16px"></div>
  <!-- INPUT CAMÉRA CACHÉ -->

function handlePhoto(input){
  if(!input.files||!input.files[0])return;
  if(!apiKey){
    toast('⚙️ Configurez votre clé API d\'abord','var(--orange)');
    setTimeout(showSettings,500);return;
  }
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    const base64=e.target.result.split(',')[1];
    const mediaType=file.type||'image/jpeg';
    analyseFacture(base64,mediaType);
  };
  reader.readAsDataURL(file);
  input.value='';
}

function analyseFacture(base64,mediaType){
  scanStep=1;render();
  // Animate progress bar
  let p=0;
  const iv=setInterval(()=>{
    p+=2;
    const pb=$('pbar');
    if(pb)pb.style.width=Math.min(p,90)+'%';
    if(p>=90)clearInterval(iv);
  },200);

  const prompt=`Tu es un assistant spécialisé en restauration professionnelle. Analyse cette photo de facture fournisseur et extrait TOUS les produits.

Pour chaque produit trouvé, retourne un JSON valide (et UNIQUEMENT le JSON, sans texte autour) avec ce format exact :
{
  "fournisseur": "nom du fournisseur si visible, sinon vide",
  "produits": [
    {
      "nom": "nom exact du produit",
      "cat": "catégorie parmi : Poisson, Crèmerie, Légumes, Viande, Épicerie, Boissons, Autre",
      "prix": "prix unitaire HT en chiffres uniquement (ex: 14.60)",
      "unite": "unité (kg, L, u, boîte…)",
      "quantite": "quantité commandée"
    }
  ]
}

Si tu ne vois pas clairement un champ, laisse-le vide. Extrait tous les produits visibles.`;

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-opus-4-5-20251001',
      max_tokens:1500,
      messages:[{
        role:'user',
        content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:prompt}
        ]
      }]
    })
  })
  .then(r=>r.json())
  .then(d=>{
    clearInterval(iv);
    const pb=$('pbar');if(pb)pb.style.width='100%';
    const text=d.content?.[0]?.text||'';
    try{
      const clean=text.replace(/```json|```/g,'').trim();
      const data=JSON.parse(clean);
      scanStep=0;render();
      showScanResults(data);
    }catch(e){
      scanStep=0;render();
      toast('⚠️ Facture peu lisible — essayez une meilleure photo','var(--orange)');
    }
  })
  .catch(()=>{
    clearInterval(iv);
    scanStep=0;render();
    toast('❌ Erreur réseau — vérifiez votre connexion','var(--red)');
  });
}

function showScanResults(data){
  const prods=data.produits||[];
  if(!prods.length){toast('Aucun produit détecté — essayez une photo plus nette','var(--orange)');return;}
  let rows=prods.map((p,i)=>`
  <div style="background:var(--s2);border-radius:10px;padding:12px 14px;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input style="flex:1;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif" id="sr-nom-${i}" value="${p.nom||''}"/>
      <select id="sr-cat-${i}" style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--cream);font-size:12px;font-family:'DM Sans',sans-serif">
        ${CATS.map(c=>`<option ${p.cat===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">PRIX HT €</div><input id="sr-prix-${i}" type="number" step="0.01" value="${p.prix||''}" style="width:100%;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--goldl);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif"/></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">UNITÉ</div><input id="sr-unite-${i}" value="${p.unite||''}" style="width:100%;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif"/></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">QTÉ</div><input id="sr-qt-${i}" value="${p.quantite||''}" style="width:100%;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif"/></div>
    </div>
  </div>`).join('');

  const html=`
  <div class="handle"></div>
  <div class="sheet-head">
    <div style="font-size:22px">✅</div>
    <div class="title">${prods.length} produit(s) détecté(s)</div>
    <button class="cls" onclick="closeModal()">✕</button>
  </div>
  <div class="sheet-body">
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Fournisseur détecté : <strong style="color:var(--cream)">${data.fournisseur||'Non détecté'}</strong><br>Vérifiez et corrigez si nécessaire avant d'enregistrer.</div>
    <div id="scan-rows">${rows}</div>
    <button class="btn-gold" onclick="saveScanResults(${prods.length},'${(data.fournisseur||'').replace(/'/g,"\\'")}')">✅ Tout enregistrer dans la mercuriale</button>
  </div>`;
  openModal(html);
}

function saveScanResults(count,fournisseur){
  let saved=0;
  for(let i=0;i<count;i++){
    const nom=document.getElementById(`sr-nom-${i}`)?.value.trim();
    if(!nom)continue;
    products.push({
      nom,
      cat:document.getElementById(`sr-cat-${i}`)?.value||'Autre',
      fournisseur:fournisseur||'',
      prix:parseFloat(document.getElementById(`sr-prix-${i}`)?.value||0).toFixed(2),
      unite:document.getElementById(`sr-unite-${i}`)?.value||'',
      trend:''
    });
    saved++;
  }
  save();closeModal();
  toast(`✅ ${saved} produit(s) enregistré(s) dans la mercuriale`);
  render();
}

function scrollMsgs(){

function sendChat(){
  const inp=$('chat-in');
  const txt=(inp?inp.value:'').trim();
  if(!txt)return;
  askAI(txt);
}

function askAI(txt){
  if(!apiKey){
    toast('⚙️ Configurez votre clé API Claude d\'abord','var(--orange)');
    setTimeout(showSettings,600);return;
  }
  chatHistory.push({role:'user',text:txt});
  isTyping=true;render();scrollMsgs();

  const systemPrompt=`Tu es l'assistant IA de cuisine professionnelle pour le restaurant "${restName}".
Tu as accès aux données suivantes :

MERCURIALE (${products.length} produits) :
${products.map(p=>`- ${p.nom} | ${p.cat} | ${p.fournisseur||'N/A'} | ${p.prix||'?'}€/${p.unite||'u'}`).join('\n')||'Aucun produit enregistré'}

FICHES RECETTES (${recettes.length} recettes) :
${recettes.map(r=>`- ${r.nom} | Coût: ${r.cout||'?'}€ | Vente: ${r.vente||'?'}€ | Marge: ${r.marge||'?'}%`).join('\n')||'Aucune recette enregistrée'}

Réponds en français, de façon concise et professionnelle. Utilise les vraies données ci-dessus pour répondre précisément. Si tu suggères des actions, sois concret.`;

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:600,
      system:systemPrompt,
      messages:chatHistory.filter(m=>m.role!=='ai'||chatHistory.indexOf(m)>0).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}))
    })
  })
  .then(r=>r.json())
  .then(d=>{
    const reply=d.content?.[0]?.text||'Je n\'ai pas pu répondre. Vérifiez votre clé API.';
    chatHistory.push({role:'ai',text:reply});
    isTyping=false;save();render();scrollMsgs();
  })
  .catch(()=>{
    chatHistory.push({role:'ai',text:'Erreur de connexion. Vérifiez votre clé API et votre connexion internet.'});
    isTyping=false;save();render();scrollMsgs();
  });
}

    <div style="font-size:22px">🍽️</div>
    <div class="title">Nouvelle fiche recette</div>
    <button class="cls" onclick="closeModal()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="field"><label>Nom de la recette *</label><input id="r-nom" placeholder="Ex: Dos de cabillaud beurre blanc"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>Catégorie</label>
        <select id="r-cat">${['Entrée','Poisson','Viande','Végétarien','Dessert','Autre'].map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Emoji</label>
        <select id="r-emoji">${EMOJIS.map(e=>`<option value="${e}">${e}</option>`).join('')}</select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>Coût matière (€) *</label><input id="r-cout" type="number" step="0.01" placeholder="0.00"/></div>
      <div class="field"><label>Prix de vente (€) *</label><input id="r-vente" type="number" step="0.01" placeholder="0.00"/></div>
    </div>
    <div class="field"><label>Ingrédients (libre)</label><textarea id="r-ings" placeholder="Ex: Cabillaud 180g, Beurre 40g, Échalotes 30g…"></textarea></div>
    <div id="r-marge-preview" style="margin-bottom:14px;font-size:13px;color:var(--muted)">Saisissez coût et prix pour calculer la marge</div>
    <button class="btn-gold" onclick="saveRecette()">✅ Enregistrer la fiche recette</button>
  </div>`;
  openModal(html);
  // live marge calc
  setTimeout(()=>{
    [$('r-cout'),$('r-vente')].forEach(el=>{if(el)el.oninput=calcMargeLive;});
  },100);
}

function calcMargeLive(){
  const cout=parseFloat($('r-cout')?.value||0);
  const vente=parseFloat($('r-vente')?.value||0);
  const prev=$('r-marge-preview');
  if(!prev)return;
  if(cout>0&&vente>0){
    const m=((vente-cout)/vente*100);
    const ben=(vente-cout).toFixed(2);
    prev.innerHTML=`Marge : <strong style="color:${margeColor(m)}">${m.toFixed(1)}%</strong> · Bénéfice : <strong style="color:var(--goldl)">${ben}€</strong>/portion`;
  } else prev.textContent='Saisissez coût et prix pour calculer la marge';
}

function saveRecette(){
  const nom=$('r-nom').value.trim();
  const cout=$('r-cout').value;
  const vente=$('r-vente').value;
  if(!nom){toast('Entrez un nom de recette','var(--red)');return;}
  if(!cout||!vente){toast('Entrez coût et prix de vente','var(--red)');return;}
  const c=parseFloat(cout),v=parseFloat(vente);
  const marge=(v-c)/v*100;
  recettes.push({
    nom,cat:$('r-cat').value,emoji:$('r-emoji').value,
    cout:c.toFixed(2),vente:v.toFixed(2),
    marge:parseFloat(marge.toFixed(1)),
    ings:$('r-ings').value.trim()
  });
  save();closeModal();
  toast('✅ Fiche recette enregistrée');render();
}

function showRecetteDetail(idx){
  const r=recettes[idx];
  const marge=r.marge||0;
  const ben=r.vente&&r.cout?(parseFloat(r.vente)-parseFloat(r.cout)).toFixed(2):'—';
  const html=`
  <div class="handle"></div>
  <div class="sheet-head">
    <div style="font-size:26px">${r.emoji||'🍽️'}</div>
    <div class="title">${r.nom}</div>
    <button class="cls" onclick="closeModal()">✕</button>
  </div>
  <div class="sheet-body">
    ${r.ings?`<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px">Ingrédients</div><div style="background:var(--s2);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.7;color:var(--cream)">${r.ings}</div></div>`:''}
    <div class="cgrid">
      <div class="citem"><div class="cl">Coût matière</div><div class="cv gold">${r.cout||'—'}€</div></div>
      <div class="citem"><div class="cl">Prix de vente</div><div class="cv">${r.vente||'—'}€</div></div>
      <div class="citem"><div class="cl">Marge brute</div><div class="cv grn">${marge?marge.toFixed(1)+'%':'—'}</div></div>
      <div class="citem"><div class="cl">Bénéfice/portion</div><div class="cv grn">${ben}€</div></div>
    </div>
    ${marge?`<div style="margin-top:12px;background:var(--s3);border-radius:100px;height:6px;overflow:hidden"><div class="mbar-f ${margeCls(marge)}" style="width:${Math.min(marge,100)}%"></div></div>`:''}
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-sm g" style="flex:1" onclick="closeModal()">✏️ Modifier</button>
      <button class="btn-sm o" onclick="deleteRecette(${idx})">🗑️ Supprimer</button>
    </div>
  </div>`;
  openModal(html);
}

function deleteRecette(idx){
  if(confirm('Supprimer cette recette ?')){
    recettes.splice(idx,1);save();closeModal();
    toast('🗑️ Recette supprimée','var(--orange)');render();
  }
}

// ═══════════════════════════════════════════
// SAISIE MANUELLE
// ═══════════════════════════════════════════
function showManualEntry(){
  showAddProduct({});
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function showSettings(){
  const html=`
  <div class="handle"></div>
  <div class="sheet-head">
    <div style="font-size:22px">⚙️</div>
    <div class="title">Paramètres</div>
    <button class="cls" onclick="closeModal()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="set-section">
      <h3>Mon restaurant</h3>
      <div class="field"><label>Nom du restaurant</label><input id="s-rest" value="${restName}" placeholder="Mon Restaurant"/></div>
    </div>
    <div class="set-section">
      <h3>Clé API Claude (Anthropic)</h3>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6">Obtenez votre clé sur <strong style="color:var(--goldl)">console.anthropic.com</strong><br>→ API Keys → Create Key</div>
      <div class="field"><label>Clé API (sk-ant-…)</label><input id="s-key" type="password" value="${apiKey}" placeholder="sk-ant-api03-…"/></div>
    </div>
    <button class="btn-gold" style="margin-bottom:12px" onclick="saveSettings()">💾 Enregistrer</button>
    <div class="set-section" style="margin-top:20px">
      <h3>Données</h3>
      <div class="set-row">
        <div class="set-item" onclick="exportData()">
          <div class="set-icon">📤</div>
          <div><div class="set-label">Exporter mes données</div><div class="set-sub">Mercuriale + recettes en JSON</div></div>
          <div class="set-arr">›</div>
        </div>
        <div class="set-item" onclick="clearChat()">
          <div class="set-icon">🗑️</div>
          <div><div class="set-label">Effacer l'historique IA</div><div class="set-sub">${chatHistory.length} messages</div></div>
          <div class="set-arr">›</div>
        </div>
      </div>
    </div>
    <div style="text-align:center;padding-top:20px;font-size:12px;color:var(--muted)">ChefSync IA v1.0 · Fait avec ❤️ pour les restaurateurs</div>
  </div>`;
  openModal(html);
}

function saveSettings(){
  const k=$('s-key').value.trim();
  const n=$('s-rest').value.trim();
  if(n)restName=n;
  if(k)apiKey=k;
  DB.set('csync_apikey',apiKey);
  DB.set('csync_restname',restName);
  closeModal();
  toast('✅ Paramètres enregistrés');render();
}

function exportData(){
  const data=JSON.stringify({restName,products,recettes},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`chefsync_${restName.replace(/\s/g,'_')}.json`;
  a.click();URL.revokeObjectURL(url);
  toast('📤 Export téléchargé');
}

function clearChat(){
  if(confirm('Effacer tout l\'historique de conversation ?')){
    chatHistory=[{role:'ai',text:'Bonjour 👨‍🍳 Historique effacé. Comment puis-je vous aider ?'}];
    save();closeModal();toast('🗑️ Historique effacé','var(--orange)');
  }
}

// ═══════════════════════════════════════════
// MODAL ENGINE
// ═══════════════════════════════════════════
function openModal(html){
  const ov=document.createElement('div');
  ov.className='overlay';ov.id='modal-ov';
  ov.innerHTML=`<div class="sheet">${html}</div>`;
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  document.body.appendChild(ov);
  // animate in
  const sheet=ov.querySelector('.sheet');
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';sheet.style.transform='translateY(0)';});
}
function closeModal(){
  const ov=$('modal-ov');
  if(!ov)return;
  const sheet=ov.querySelector('.sheet');
  sheet.style.transition='transform .25s ease-in';
  sheet.style.transform='translateY(100%)';
  setTimeout(()=>ov.remove(),250);
}

// ═══════════════════════════════════════════
// BIND EVENTS (called after render)
// ═══════════════════════════════════════════
function bindEvents(){
  // chat input on AI tab
  const ci=$('chat-in');
  if(ci){ci.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}});}
}

// ═══════════════════════════════════════════
// INSTALL PROMPT (iOS hint)
// ═══════════════════════════════════════════
function showInstallHint(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  if(isIOS&&!isStandalone&&!DB.get('csync_hint_shown',false)){
    DB.set('csync_hint_shown',true);
    setTimeout(()=>{
      const banner=document.createElement('div');
      banner.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:18px;right:18px;background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px;z-index:200;font-size:13px;line-height:1.5;color:var(--cream)';
      banner.innerHTML='<div style="font-weight:600;margin-bottom:4px">💡 Installer sur votre écran d\'accueil</div><div style="color:var(--muted)">Appuyez sur <strong>⎙ Partager</strong> puis <strong>"Sur l\'écran d\'accueil"</strong> pour une expérience app complète.</div><div style="margin-top:10px;text-align:right"><span style="color:var(--gold);cursor:pointer;font-size:13px" onclick="this.parentElement.parentElement.remove()">Compris ✕</span></div>';
      document.body.appendChild(banner);
      setTimeout(()=>{if(banner.parentElement)banner.remove();},8000);
    },2000);
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
showInstallHint();
</script>
